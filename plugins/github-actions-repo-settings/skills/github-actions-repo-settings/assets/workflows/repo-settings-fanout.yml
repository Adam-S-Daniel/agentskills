# Central fan-out workflow: enforce repo-settings-as-code across many repos.
#
# Place this in the CENTRAL repo you choose to own fleet settings (for example a
# `.github` repo or a dedicated `repo-settings` repo), alongside:
#   scripts/repo_settings.py     (copied from the github-actions-repo-settings skill)
#   repo-settings/fleet.yml      (your fleet config -- see repo-settings.schema.md)
#
# Auth: applying repo settings needs repo-ADMIN, which the default GITHUB_TOKEN
# does NOT have. Create a fine-grained PAT (or GitHub App token) with
# "Administration: Read and write" + "Actions: Read and write" over every target
# repo, and store it as the `REPO_ADMIN_TOKEN` secret in this central repo.
#
# Behavior:
#   * pull_request touching the config/script -> drift report only (no changes),
#     fails the check if there is drift so review shows what would change.
#   * push to main touching the config/script -> apply.
#   * weekly schedule + manual dispatch      -> apply (re-converges any drift).

name: repo-settings

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without applying"
        type: boolean
        default: false
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  push:
    branches: [main]
    paths:
      - "repo-settings/fleet.yml"
      - "scripts/repo_settings.py"
      - ".github/workflows/repo-settings.yml"
  pull_request:
    paths:
      - "repo-settings/fleet.yml"
      - "scripts/repo_settings.py"
      - ".github/workflows/repo-settings.yml"

permissions:
  contents: read

concurrency:
  group: repo-settings
  cancel-in-progress: false

jobs:
  repo-settings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (2024-10-23)

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0 (2024-10-31)
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Drift report (pull request)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: python scripts/repo_settings.py diff --config repo-settings/fleet.yml

      - name: Apply (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: python scripts/repo_settings.py apply --config repo-settings/fleet.yml --dry-run

      - name: Apply
        if: github.event_name != 'pull_request' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: python scripts/repo_settings.py apply --config repo-settings/fleet.yml
